    <!-- SEO -->
    <meta name="description" content="Book trusted home services across Pakistan — cleaning, plumbing, electrical, AC repair and more." />

    <!-- Open Graph -->
    <meta property="og:title" content="HomeServe - Home Services Pakistan" />

    <!-- Icons -->

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- Capture beforeinstallprompt before React mounts (timing fix) -->
    <script>
      window.__pwaInstallEvent = null;
      window.__pwaInstalled = window.matchMedia('(display-mode: standalone)').matches;
      window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault();
        window.__pwaInstallEvent = e;
        window.dispatchEvent(new Event('pwa-prompt-ready'));
      });
      window.addEventListener('appinstalled', function() {
        window.__pwaInstalled = true;
        window.__pwaInstallEvent = null;
      });
    </script>
  </head>
  <body class="bg-gray-50 text-slate-800 font-sans antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
