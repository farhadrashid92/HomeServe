<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HomeServe — You're Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #f8fafc;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #1e293b;
      text-align: center;
      padding: 2rem;
    }
    .icon { font-size: 4rem; margin-bottom: 1.5rem; }
    h1 { font-size: 1.75rem; font-weight: 800; margin-bottom: 0.75rem; }
    p { color: #64748b; max-width: 360px; line-height: 1.6; margin-bottom: 2rem; }
    a {
      background: #10b981;
      color: white;
      padding: 0.875rem 2rem;
      border-radius: 0.875rem;
      font-weight: 700;
      text-decoration: none;
      font-size: 0.95rem;
    }
    a:hover { background: #059669; }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>You're Offline</h1>
  <p>It looks like you don't have an internet connection. Please check your connection and try again.</p>
  <a href="/">Try Again</a>
</body>
</html>
